<div class="scene">
  <div class="beam beam1"></div>
  <div class="beam beam2"></div>
  <div class="gear-ring"></div>
  <div class="floor"></div>

  <!-- Carros (Background) -->
  <div class="lineup">
    <div class="car c1"><svg width="240" height="90" viewBox="0 0 240 90"><path d="M10 80 Q10 60 35 58 L55 40 Q70 26 100 26 L160 26 Q185 26 195 42 L215 58 Q235 60 235 80 L235 84 L10 84 Z" fill="#3b6b95"/><circle cx="55" cy="84" r="14" fill="#0c1c2e"/><circle cx="190" cy="84" r="14" fill="#0c1c2e"/></svg></div>
    <div class="car c2"><svg width="260" height="95" viewBox="0 0 260 95"><path d="M8 85 Q8 63 34 61 L58 42 Q74 27 106 27 L172 27 Q198 27 209 44 L232 61 Q254 63 254 85 L254 89 L8 89 Z" fill="#3f77ab"/><circle cx="58" cy="89" r="15" fill="#0c1c2e"/><circle cx="204" cy="89" r="15" fill="#0c1c2e"/></svg></div>
    <div class="car c3"><svg width="300" height="110" viewBox="0 0 300 110"><path d="M10 98 Q10 72 40 70 L68 48 Q86 30 122 30 L198 30 Q228 30 240 50 L268 70 Q294 72 294 98 L294 102 L10 102 Z" fill="#4a86bd"/><path d="M78 68 L92 50 Q100 42 118 42 L188 42 Q206 42 214 52 L226 68 Z" fill="#a9c7e3" opacity="0.55"/><circle cx="66" cy="102" r="17" fill="#0c1c2e"/><circle cx="236" cy="102" r="17" fill="#0c1c2e"/></svg></div>
    <div class="car c4"><svg width="260" height="95" viewBox="0 0 260 95"><path d="M8 85 Q8 63 34 61 L58 42 Q74 27 106 27 L172 27 Q198 27 209 44 L232 61 Q254 63 254 85 L254 89 L8 89 Z" fill="#3f77ab"/><circle cx="58" cy="89" r="15" fill="#0c1c2e"/><circle cx="204" cy="89" r="15" fill="#0c1c2e"/></svg></div>
    <div class="car c5"><svg width="240" height="90" viewBox="0 0 240 90"><path d="M10 80 Q10 60 35 58 L55 40 Q70 26 100 26 L160 26 Q185 26 195 42 L215 58 Q235 60 235 80 L235 84 L10 84 Z" fill="#3b6b95"/><circle cx="55" cy="84" r="14" fill="#0c1c2e"/><circle cx="190" cy="84" r="14" fill="#0c1c2e"/></svg></div>
  </div>

  <!-- Acento de Ferramenta -->
  <svg class="tool-accent" viewBox="0 0 100 100">
    <path d="M70 10 L60 20 L65 25 L75 15 A15 15 0 1 1 55 35 L20 70 A6 6 0 1 0 30 80 L65 45 A15 15 0 0 0 70 10 Z" fill="#3b8fd6" opacity="0.5"/>
  </svg>

  <div class="content">
    <!-- Container do Login -->
    <div class="login-card">
      
      <!-- Logo CBN Motors (Sempre visível no topo do cartão) -->
      <div class="logo-wrapper">
        <img src="img/Logo.png" alt="CBN Motors Logo" class="card-logo">
      </div>
      
      <!-- Mensagem de Sucesso (Exibida após login) -->
      <div *ngIf="showWelcomeCard" class="text-center w-100 py-4 welcome-animation">
        <h1 class="mb-3 check-pop" style="color: var(--accent); font-size: 4rem;">
          <i class="bi bi-check-circle-fill"></i>
        </h1>
        <h3 class="fw-bold" style="color: #fff; font-size: 24px; margin-bottom: 8px;">Seja bem-vindo(a)!</h3>
        <p class="mb-4" style="color: var(--silver-500); font-size: 14px;">Autenticação realizada com sucesso.</p>
        <button class="btn-action w-100" (click)="onConfirmar()">OK</button>
      </div>

      <!-- Formulário de Login Padrão -->
      <div *ngIf="!showWelcomeCard">
        <h1>Entrar</h1>
        <p class="sub">Acesse o painel da CBN Motors</p>
        
        <!-- Chama o componente do form passando o evento de sucesso -->
        <app-login-form (loginSuccess)="onLoginSuccess()"></app-login-form>
      </div>

    </div>
  </div>
</div>
